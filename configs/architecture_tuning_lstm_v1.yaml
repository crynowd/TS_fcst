stage: architecture_tuning_benchmark
run_name: architecture_tuning_lstm_v1

benchmark:
  external_data_dir: D:/Projects/Data/Stocks/us/ETFs
  file_pattern: "*.txt"
  sample_size: 12
  random_seed: 20260329

data_transforms:
  date_column: Date
  close_column: Close
  min_history: 240

models:
  selected_models:
    - lstm_forecast
    - chaotic_lstm_forecast
  candidates:
    lstm_forecast:
      - candidate_id: lstm_g001
        compare_group_id: lstm_grp_001
        model_params:
          hidden_size: 32
          num_layers: 1
          dropout: 0.0
          seed: 2026
        runtime_params: {}
      - candidate_id: lstm_g002
        compare_group_id: lstm_grp_002
        model_params:
          hidden_size: 64
          num_layers: 1
          dropout: 0.0
          seed: 2026
        runtime_params: {}
      - candidate_id: lstm_g003
        compare_group_id: lstm_grp_003
        model_params:
          hidden_size: 64
          num_layers: 2
          dropout: 0.1
          seed: 2026
        runtime_params: {}
      - candidate_id: lstm_g004
        compare_group_id: lstm_grp_004
        model_params:
          hidden_size: 128
          num_layers: 2
          dropout: 0.1
          seed: 2026
        runtime_params: {}

    chaotic_lstm_forecast:
      - candidate_id: chaotic_lstm_g001
        compare_group_id: lstm_grp_001
        model_params:
          hidden_size: 32
          num_layers: 1
          dropout: 0.0
          r: 3.9
          seed: 2026
        runtime_params: {}
      - candidate_id: chaotic_lstm_g002
        compare_group_id: lstm_grp_002
        model_params:
          hidden_size: 64
          num_layers: 1
          dropout: 0.0
          r: 3.9
          seed: 2026
        runtime_params: {}
      - candidate_id: chaotic_lstm_g003
        compare_group_id: lstm_grp_003
        model_params:
          hidden_size: 64
          num_layers: 2
          dropout: 0.1
          r: 3.9
          seed: 2026
        runtime_params: {}
      - candidate_id: chaotic_lstm_g004
        compare_group_id: lstm_grp_004
        model_params:
          hidden_size: 128
          num_layers: 2
          dropout: 0.1
          r: 3.9
          seed: 2026
        runtime_params: {}

horizons:
  - 1
  - 5
  - 20

evaluation:
  window_sizes:
    "1": 64
    "5": 32
    "20": 16
  validation:
    method: rolling_origin
    n_folds: 3
  training:
    max_epochs: 12
    early_stopping_patience: 5
    batch_size: 128
    learning_rate: 0.001
  timeouts:
    max_train_seconds_per_task: 30
    max_predict_seconds_per_task: 10

device: auto

reporting:
  include_series_preview_rows: 1000

outputs:
  output_dir: artifacts/architecture_tuning/lstm_v1
  selected_series_csv: artifacts/architecture_tuning/lstm_v1/selected_series_architecture_tuning_lstm_v1.csv
  candidate_level_results_parquet: artifacts/architecture_tuning/lstm_v1/candidate_level_results_lstm_v1.parquet
  candidate_level_results_csv: artifacts/architecture_tuning/lstm_v1/candidate_level_results_lstm_v1.csv
  series_level_results_parquet: artifacts/architecture_tuning/lstm_v1/series_level_results_lstm_v1.parquet
  pair_comparison_csv: artifacts/architecture_tuning/lstm_v1/pair_comparison_summary_lstm_v1.csv
  best_candidate_summary_csv: artifacts/architecture_tuning/lstm_v1/best_candidate_summary_lstm_v1.csv
  excel_report_path: artifacts/reports/architecture_tuning_lstm_v1.xlsx
