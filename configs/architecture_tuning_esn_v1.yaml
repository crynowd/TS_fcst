  - 1
  - 5
  - 20

evaluation:
  window_sizes:
    "1": 64
    "5": 32
    "20": 16
  validation:
    method: rolling_origin
    n_folds: 3
  training:
    max_epochs: 10
    early_stopping_patience: 3
    batch_size: 128
    learning_rate: 0.001
  timeouts:
    max_train_seconds_per_task: 25
    max_predict_seconds_per_task: 10

device: cpu

reporting:
  include_series_preview_rows: 1000

outputs:
  output_dir: artifacts/architecture_tuning/esn_v1
