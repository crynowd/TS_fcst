stage: forecasting_benchmark_smoke

data:
  source_path: artifacts/processed/log_returns_v1.parquet
  dataset_profile: core_balanced
  max_series: 100
  series_selection_mode: first_n

models:
  active:
    - naive_zero
    - naive_mean
    - ridge_lag
  inactive_but_supported: []

selected_architectures:
  source_config: configs/forecasting_selected_architectures_v1.yaml
  baselines_keep:
    - naive_zero
    - naive_mean
    - ridge_lag
  candidate_ids:
    - esn_g004
    - chaotic_esn_g003
    - transient_chaotic_esn_g002
    - vanilla_mlp_g004
    - chaotic_mlp_g003
    - logistic_g006
    - lstm_g001
    - chaotic_lstm_g003

horizons:
  - 1
  - 5
  - 20

window_sizes:
  "1": 64
  "5": 32
  "20": 16

validation:
  method: rolling_origin
  n_folds: 1

timeouts:
  max_train_seconds_per_task: 120
  max_predict_seconds_per_task: 10

training:
  max_epochs: 2
  early_stopping_patience: 1
  batch_size: 128
  learning_rate: 0.001

model_overrides:
  ridge_lag:
    alpha: 1.0

filters:
  active_models: []
  horizons: []
  series_ids: []
  resume_failed_only: false

outputs:
  run_name: forecasting_benchmark_smoke_v1
  raw_predictions_path: artifacts/forecasting/raw_predictions_smoke_v1.parquet
  fold_metrics_path: artifacts/forecasting/fold_metrics_smoke_v1.parquet
  series_metrics_path: artifacts/forecasting/series_metrics_smoke_v1.parquet
  task_audit_path: artifacts/forecasting/task_audit_smoke_v1.parquet
  excel_report_path: artifacts/reports/forecasting_smoke_summary_v1.xlsx
